<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rob's Twitter – Live Feed</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
        </svg>
        <span class="logo-text">Rob's Twitter</span>
      </div>

      <div class="header-right">
        <div class="connection-status">
          <span class="status-dot" id="statusDot" aria-label="Connection status"></span>
          <span class="status-label" id="statusLabel">Connecting…</span>
        </div>
        <button class="theme-btn" id="themeBtn" title="Toggle dark mode" aria-label="Toggle dark mode">
          <span id="themeIcon">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Layout ── -->
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <section class="sidebar-section">
        <h2 class="sidebar-title">Stats</h2>
        <ul class="stats-list">
          <li class="stat-item">
            <span class="stat-value" id="statTotal">0</span>
            <span class="stat-label">Total tweets</span>
          </li>
          <li class="stat-item">
            <span class="stat-value" id="statRate">0</span>
            <span class="stat-label">Per minute</span>
          </li>
          <li class="stat-item">
            <span class="stat-value" id="statLang">—</span>
            <span class="stat-label">Top language</span>
          </li>
        </ul>
      </section>

      <section class="sidebar-section">
        <h2 class="sidebar-title">Filter</h2>
        <input
          type="search"
          id="filterInput"
          class="filter-input"
          placeholder="Keyword, #hashtag, @user…"
          autocomplete="off"
          spellcheck="false"
        />
        <p class="filter-hint" id="filterHint"></p>
      </section>

      <section class="sidebar-section">
        <h2 class="sidebar-title">Top Hashtags</h2>
        <ul class="hashtag-list" id="hashtagList">
          <li class="hashtag-empty">Waiting for tweets…</li>
        </ul>
      </section>
    </aside>

    <!-- Feed -->
    <main class="feed-column">
      <!-- New-tweets banner (hidden until user scrolls down) -->
      <button class="new-tweets-banner" id="newTweetsBanner" aria-live="polite" hidden>
        Show new tweets
      </button>

      <div class="feed" id="feed" role="feed" aria-label="Live tweet feed">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48" opacity=".25">
            <path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
          </svg>
          <p>Waiting for live tweets…</p>
          <p class="empty-sub">Make sure the Kafka producer is running.</p>
        </div>
      </div>
    </main>

  </div><!-- /.layout -->

  <script src="app.js"></script>
</body>
</html>
