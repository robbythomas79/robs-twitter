version: '3.8'

# ──────────────────────────────────────────────────────────────────────────────
# Rob's Twitter – full-stack docker-compose
#
# Required environment variables (copy .env.example → .env and fill in):
#   TWITTER_API_KEY, TWITTER_API_SECRET,
#   TWITTER_ACCESS_TOKEN_KEY, TWITTER_ACCESS_TOKEN_SECRET
#   TWITTER_FOLLOW_ACCOUNTS   e.g. "NASA,BBCNews,elonmusk"
#   TWITTER_TRACK_KEYWORDS    optional, e.g. "python,kafka"
#   TWITTER_LANGUAGES         optional, e.g. "en"  (empty = all languages)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Kafka (all-in-one: broker + zookeeper + UI) ──
  kafka:
    image: landoop/fast-data-dev:latest
    hostname: kafka
    ports:
      - "9092:9092"   # Kafka broker
      - "2181:2181"   # Zookeeper
      - "3030:3030"   # Landoop web UI
      - "8081:8081"   # Schema Registry
      - "8082:8082"   # Kafka REST Proxy
      - "8083:8083"   # Kafka Connect
    environment:
      # Must match the service hostname so inter-container Kafka clients receive
      # an advertised address they can actually reach (not 127.0.0.1 loopback).
      ADV_HOST: "kafka"
      RUNTESTS: "0"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Twitter Kafka producer ──
  # Uses our custom producer/producer.py (volume-mounted from this repo).
  # Configure which accounts/keywords to stream via .env — no code changes needed.
  twitter-producer:
    image: python:3.9-slim
    working_dir: /app
    volumes:
      - ./producer:/app          # mount our custom producer script
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -q gcc librdkafka-dev &&
        pip install --quiet -r requirements.txt &&
        python producer.py
      "
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      BROKER_URL:   "kafka:9092"
      TOPIC:        "twitterTopic"
      TWITTER_API_KEY:             "${TWITTER_API_KEY}"
      TWITTER_API_SECRET:          "${TWITTER_API_SECRET}"
      TWITTER_ACCESS_TOKEN_KEY:    "${TWITTER_ACCESS_TOKEN_KEY}"
      TWITTER_ACCESS_TOKEN_SECRET: "${TWITTER_ACCESS_TOKEN_SECRET}"
      TWITTER_FOLLOW_ACCOUNTS:     "${TWITTER_FOLLOW_ACCOUNTS:-}"
      TWITTER_TRACK_KEYWORDS:      "${TWITTER_TRACK_KEYWORDS:-}"
      TWITTER_LANGUAGES:           "${TWITTER_LANGUAGES:-}"
    restart: on-failure

  # ── Rob's Twitter frontend ──
  frontend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      PORT:          "3000"
      KAFKA_BROKER:  "kafka:9092"
      KAFKA_TOPIC:   "twitterTopic"
    restart: unless-stopped